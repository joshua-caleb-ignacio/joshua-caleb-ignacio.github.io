<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#222222" />

  <link rel="shortcut icon" href="https://arbyn.argabioso.com/assets/icons/favicon.ico" />

  <title>Joshua Caleb Acosta Ignacio - Family Tree</title>

  <link href="https://getbootstrap.com/docs/5.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montagu+Slab:opsz,wght@16..144,100..700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=open_in_new" />

  <link rel="stylesheet" href="https://arbyn.argabioso.com/shared/css/fonts.css" />
  <link rel="stylesheet" href="https://arbyn.argabioso.com/family/css/main.css" />
</head>

<body>
  <div id="tree-wrapper">
    <div id="tree"></div>
  </div>

  <!-- Offcanvas Sidebar -->
  <div class="offcanvas offcanvas-start" tabindex="-1" id="personDetails" aria-labelledby="personName">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title" id="personName"></h5>
      <button type="button" id="offcanvasCloseBtn" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div id="personDetailsDesc" class="offcanvas-body"></div>
  </div>

  <script src="https://arbyn.argabioso.com/shared/js/extend.js"></script>

  <script src="js/bootstrap/dom/manipulator.js"></script>
  <script src="js/bootstrap/dom/data.js"></script>
  <script src="js/bootstrap/dom/selector-engine.js"></script>
  <script src="js/bootstrap/dom/event-handler.js"></script>
  <script src="js/bootstrap/base-component.js"></script>
  <script src="js/bootstrap/offcanvas.js"></script>

  <script src="https://arbyn.argabioso.com/family/js/data.js"></script>

  <script src="js/data.js"></script>

  <script type="module" src="js/preprocess.js"></script>
  <script type="module" src="js/tree.js"></script>
  <script type="module" src="js/events.js"></script>

  <script src="js/lightbox.js"></script>
</body>

</html>
